name: Daily NHL Data Pull

on:
  schedule:
    # Runs every day at 9:00 UTC (~4-5am ET) — after most games are final
    - cron: "0 9 * * *"
  workflow_dispatch: {}   # lets you also trigger it manually from the Actions tab

jobs:
  run-etl:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r etl/requirements.txt

      - name: Run boxscore ETL for yesterday's games
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python etl/pull_nhl_data.py

      - name: Run Edge data pull (defaults to the season in progress, skips anything already pulled)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python etl/pull_edge_data.py

      - name: Run play-by-play game-state + shot-location ETL (skips games already processed)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python etl/pull_play_by_play.py

      - name: Backfill shifts, officials, and attendance (skips games already filled)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python etl/backfill_game_details.py

      - name: Stamp game-day weather (archive lags ~5 days; catches up each run)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python etl/backfill_weather.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install app dependencies
        run: npm ci

      - name: Refresh career season totals + rosters (npm run ingest)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run ingest

      - name: Recompute cooked scores (npm run cook)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run cook

      - name: Refresh career regular-vs-playoff table
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -c "
          import os
          from supabase import create_client
          sb = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_KEY'])
          sb.rpc('refresh_player_career_regular_vs_playoff_stats').execute()
          print('career table refreshed')
          "