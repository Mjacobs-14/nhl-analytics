name: Daily NHL Data Pull

on:
  schedule:
    # Runs every day at 9:00 UTC (~4-5am ET) — after most games are final
    - cron: "0 9 * * *"
  workflow_dispatch: {}   # lets you also trigger it manually from the Actions tab

jobs:
  run-etl:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r etl/requirements.txt

      - name: Run boxscore ETL for yesterday's games
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python etl/pull_nhl_data.py

      - name: Run Edge data pull (current season, skips anything already pulled)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python etl/pull_edge_data.py --seasons 20252026

      - name: Run play-by-play game-state + shot-location ETL (skips games already processed)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python etl/pull_play_by_play.py

      - name: Backfill shifts, officials, and attendance (skips games already filled)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python etl/backfill_game_details.py