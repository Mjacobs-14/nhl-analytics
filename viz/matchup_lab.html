<style>

:root[data-theme=light]{--paper:#f8f8f5;--ink:#17181b;--ink-2:#5b5f66;--ink-3:#989ca4;--line:#e5e5e0;--card:#fff;--hd:#e34948;--md:#eda100;--ld:#8f97a3;--accent:#2a78d6;--chipbg:#f0f0eb;--pos:#1baf7a;--neg:#e34948;}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font:15px/1.5 "Segoe UI",system-ui,sans-serif;
  font-variant-numeric:tabular-nums;padding:26px clamp(14px,4vw,44px) 46px;}
h1{font-size:clamp(20px,3vw,27px);letter-spacing:-.02em;margin:0 0 2px;font-weight:750;}
.sub{color:var(--ink-2);margin:0 0 18px;max-width:74ch;}
.bar{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin-bottom:18px;}
select{background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:7px;padding:7px 10px;font:inherit;}
.chip{border:1px solid var(--line);background:var(--chipbg);color:var(--ink-2);border-radius:999px;padding:6px 13px;font:600 13px/1 inherit;cursor:pointer;}
select:focus-visible,.chip:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.score{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 22px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:center;gap:26px;flex-wrap:wrap;}
.score .tm{font-size:clamp(18px,2.4vw,24px);font-weight:750;}
.score .xg{font-size:clamp(26px,4vw,38px);font-weight:750;letter-spacing:-.02em;}
.score .vs{color:var(--ink-3);font-size:13px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:860px){.grid{grid-template-columns:1fr;}}
.panel{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px 18px;}
.panel h2{margin:0 0 3px;font-size:15.5px;font-weight:700;}
.panel .sm{color:var(--ink-2);font-size:12.5px;margin-bottom:12px;}
.mixlab{display:flex;justify-content:space-between;color:var(--ink-2);font-size:12px;margin:10px 0 3px;font-weight:600;}
.mix{display:flex;height:22px;border-radius:6px;overflow:hidden;}
.mix div{height:100%;}
.mixnum{display:flex;justify-content:space-between;color:var(--ink-3);font-size:11.5px;margin-top:3px;}
.rowk{display:grid;grid-template-columns:1fr auto;gap:4px 10px;font-size:13px;margin-top:12px;}
.rowk span{color:var(--ink-2);} .rowk b{text-align:right;}
.gk{margin-top:14px;padding-top:12px;border-top:1px solid var(--line);}
.gk .nm{font-weight:700;font-size:13.5px;}
.bandrow{display:grid;grid-template-columns:80px 1fr auto;gap:8px;align-items:center;font-size:12.5px;margin-top:5px;}
.bandrow .lb{color:var(--ink-2);font-weight:600;}
.bandrow .tr{position:relative;height:12px;background:var(--chipbg);border-radius:3px;}
.bandrow .fl{position:absolute;left:0;top:0;bottom:0;border-radius:3px;background:var(--accent);opacity:.8;}
.bandrow .tick{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--ink-3);}
.bandrow .dv{font-weight:700;}
.clash{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 18px;margin-top:14px;color:var(--ink-2);font-size:13.5px;}
.clash b{color:var(--ink);}
.note{color:var(--ink-3);font-size:12.5px;margin-top:16px;max-width:86ch;}
.legend{display:inline-flex;gap:14px;align-items:center;color:var(--ink-2);font-size:12.5px;}
.legend .k{display:inline-flex;gap:5px;align-items:center;}.legend .b{width:11px;height:11px;border-radius:3px;}
</style>

const seasons=[...new Set(D.map(d=>d.s))].sort().reverse();
const bySeason={};D.forEach(d=>{(bySeason[d.s]=bySeason[d.s]||[]).push(d);});
// pooled league band save % (documented; bands defined on pooled xg_grid)
const LSV={h:0.804,m:0.903,l:0.975};
const sel=document.getElementById('season'),ta=document.getElementById('ta'),tb=document.getElementById('tb');
seasons.forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=k.slice(0,4)+'–'+k.slice(6);sel.appendChild(o);});
function fillTeams(){const teams=bySeason[sel.value].map(d=>d.t).sort();
  [ta,tb].forEach(s=>{const cur=s.value;s.innerHTML='';teams.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;s.appendChild(o);});
    if(teams.includes(cur))s.value=cur;});
  if(ta.value===tb.value)tb.value=teams.find(t=>t!==ta.value);}
sel.value=seasons[0];fillTeams();
ta.value=bySeason[sel.value].some(d=>d.t==='DAL')?'DAL':ta.value;
tb.value=bySeason[sel.value].some(d=>d.t==='VGK')?'VGK':tb.value;
const css=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const get=(s,t)=>bySeason[s].find(d=>d.t===t);
function leagueAvg(s){const rs=bySeason[s];const n=rs.length;
  return{sapg:rs.reduce((a,d)=>a+d.sa/d.gp,0)/n,
    h:rs.reduce((a,d)=>a+d.dh,0)/n,m:rs.reduce((a,d)=>a+d.dm,0)/n,l:rs.reduce((a,d)=>a+d.dl,0)/n};}
// one attacking direction: A shoots on B
function direction(A,B,L){
  const shots=(A.sf/A.gp)*(B.sa/B.gp)/L.sapg;
  let mh=(A.oh*B.dh)/L.h, mm=(A.om*B.dm)/L.m, ml=(A.ol*B.dl)/L.l;
  const tot=mh+mm+ml; mh/=tot; mm/=tot; ml/=tot;
  const sv={h:B.gh??LSV.h,m:B.gm??LSV.m,l:B.gl??LSV.l};
  const xg=shots*(mh*(1-sv.h)+mm*(1-sv.m)+ml*(1-sv.l));
  return{shots,mix:{h:mh*100,m:mm*100,l:ml*100},sv,xg,
    xgb:{h:shots*mh*(1-sv.h),m:shots*mm*(1-sv.m),l:shots*ml*(1-sv.l)}};}
function mixBar(h,m,l){return '<div class="mix">'+
  '<div style="width:'+h+'%;background:var(--hd)"></div>'+
  '<div style="width:'+m+'%;background:var(--md)"></div>'+
  '<div style="width:'+l+'%;background:var(--ld)"></div></div>'+
  '<div class="mixnum"><span>'+h.toFixed(1)+'% HD</span><span>'+m.toFixed(1)+'% MD</span><span>'+l.toFixed(1)+'% LD</span></div>';}
function gkPanel(B,dir){
  const rows=[['High danger',B.gh,LSV.h],['Medium',B.gm,LSV.m],['Low danger',B.gl,LSV.l]];
  const known=B.gh!=null;
  return '<div class="gk"><div class="nm">🥅 '+(B.gk||'—')+(known?'':' <span style="color:var(--ink-3);font-weight:400">(league-avg rates: small sample)</span>')+'</div>'+
    rows.map(([lb,v,lg])=>{const val=v??lg;const lo=0.75,hi=1.0;
      const w=Math.max(0,Math.min(100,(val-lo)/(hi-lo)*100)),tk=(lg-lo)/(hi-lo)*100;
      const d=v==null?null:v-lg;
      return '<div class="bandrow"><div class="lb">'+lb+'</div>'+
        '<div class="tr"><div class="fl" style="width:'+w+'%"></div><div class="tick" style="left:'+tk+'%"></div></div>'+
        '<div class="dv">'+ '.'+Math.round(val*1000)+(d==null?'':' <span style="color:var(--'+(d>=0?'pos':'neg')+')">('+(d>=0?'+':'')+(d*100).toFixed(1)+')</span>')+'</div></div>';}).join('')+
    '<div class="mixnum" style="margin-top:5px"><span>grey tick = league save % in that band · expected goals against by band: '+
    'HD '+dir.xgb.h.toFixed(2)+' · MD '+dir.xgb.m.toFixed(2)+' · LD '+dir.xgb.l.toFixed(2)+'</span></div></div>';}
function render(){
  fillTeams();
  const s=sel.value,A=get(s,ta.value),B=get(s,tb.value);
  if(!A||!B||A.t===B.t){document.getElementById('score').textContent='Pick two different teams.';return;}
  const L=leagueAvg(s);
  const ab=direction(A,B,L),ba=direction(B,A,L);
  document.getElementById('score').innerHTML=
    '<span class="tm">'+A.t+'</span><span class="xg">'+ab.xg.toFixed(2)+'</span>'+
    '<span class="vs">expected goals<br>('+s.slice(0,4)+'–'+s.slice(6)+' profiles)</span>'+
    '<span class="xg">'+ba.xg.toFixed(2)+'</span><span class="tm">'+B.t+'</span>';
  const panel=(X,Y,d,dOpp)=>'<div class="panel"><h2>'+X.t+' attacking '+Y.t+'</h2>'+
    '<div class="sm">'+X.t+' generates '+(X.sf/X.gp).toFixed(1)+' on-net shots/gm · '+Y.t+' allows '+(Y.sa/Y.gp).toFixed(1)+' → blended <b>'+d.shots.toFixed(1)+'</b></div>'+
    '<div class="mixlab"><span>'+X.t+' wants</span><span>league</span><span>'+Y.t+' concedes</span></div>'+
    mixBar(X.oh,X.om,X.ol)+
    '<div style="height:7px"></div>'+mixBar(d.mix.h,d.mix.m,d.mix.l)+
    '<div class="mixnum"><span>&uarr; blended attack mix</span></div>'+
    '<div style="height:7px"></div>'+mixBar(Y.dh,Y.dm,Y.dl)+
    gkPanel(Y,d)+'</div>';
  document.getElementById('grid').innerHTML=panel(A,B,ab)+panel(B,A,ba);
  // style clash narrative
  const bits=[];
  const hdA=A.oh-L.h,hdBdef=B.dh-L.h;
  if(hdA>1.5&&hdBdef<-1.5)bits.push('<b>'+A.t+'</b> hunts the slot ('+A.oh.toFixed(1)+'% HD vs league '+L.h.toFixed(1)+'%) but <b>'+B.t+'</b> concedes only '+B.dh.toFixed(1)+'% there — a genuine style fight.');
  else if(hdA>1.5&&hdBdef>1.5)bits.push('<b>'+A.t+'</b> hunts the slot AND <b>'+B.t+'</b> bleeds it ('+B.dh.toFixed(1)+'% HD allowed) — danger zone lights up.');
  const hdB=B.oh-L.h,hdAdef=A.dh-L.h;
  if(hdB>1.5&&hdAdef>1.5)bits.push('Other way: <b>'+B.t+'</b> wants high-danger and <b>'+A.t+'</b> gives it up ('+A.dh.toFixed(1)+'%).');
  const gEdge=(B.gh!=null?B.gh-LSV.h:0)-(A.gh!=null?A.gh-LSV.h:0);
  if(Math.abs(gEdge)>0.01)bits.push('Goalie edge on high-danger: <b>'+(gEdge>0?B.gk+' ('+B.t+')':A.gk+' ('+A.t+')')+'</b> by '+(Math.abs(gEdge)*100).toFixed(1)+' points of HD save %.');
  document.getElementById('clash').innerHTML='<b>Style clash:</b> '+(bits.length?bits.join(' '):'No extreme mismatches — both teams close to league-average shot diets.');
  document.getElementById('method').innerHTML='How it works: expected shots = A&rsquo;s shots/gm &times; B&rsquo;s allowed/gm &divide; league average. '+
    'The attack mix blends A&rsquo;s offensive shot diet with B&rsquo;s defensive concession profile (odds-ratio blend vs league). Each band is then priced by the goalie&rsquo;s career save % in that band (high &ge; .15 xG, medium .05&ndash;.15, low &lt; .05; league .804/.903/.975). '+
    'Season profiles, primary goalie by shots faced. <b>A descriptive style-clash preview, not a prediction or betting model</b> — no home ice, rest, injuries, or current form.';
}
document.getElementById('swap').onclick=()=>{const x=ta.value;ta.value=tb.value;tb.value=x;render();};
sel.onchange=render;ta.onchange=render;tb.onchange=render;
new MutationObserver(()=>render()).observe(document.documentElement,{attributes:true,attributeFilter:['data-theme']});
render();
</script></body>
